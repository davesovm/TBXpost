services:
  - type: worker
    name: tbxpost
    runtime: python
    repo: https://github.com/davesovm/TBXpost
    branch: main
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      # ── Required secrets (set manually in Render dashboard) ──────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL
        sync: false
      - key: TELEGRAM_ADMIN_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # ── Optional secrets ──────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Non-secret config (safe to commit) ───────────────────────────────
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: TIMEZONE
        value: UTC
      - key: RSS_FEEDS
        value: "https://hnrss.org/frontpage,https://dev.to/feed"
      - key: NEWS_MIN_SCORE
        value: "7"
      - key: DB_PATH
        value: tbxpost.db
